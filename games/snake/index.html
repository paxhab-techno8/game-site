<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Snake</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 16px;
  }
  .hud {
    display: flex;
    gap: 24px;
    font-size: 0.95rem;
    color: #bbb;
  }
  .hud strong { color: #fff; }
  canvas {
    background: #0a0a0a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    image-rendering: pixelated;
    max-width: min(90vw, 90vh);
    max-height: min(90vw, 90vh);
    width: 480px;
    height: 480px;
  }
  .footer {
    font-size: 0.8rem;
    color: #888;
    text-align: center;
  }
  .footer kbd {
    background: #1a1a1a;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.85em;
    font-family: ui-monospace, monospace;
    color: #ddd;
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    font-size: 1.4rem;
    color: #fff;
  }
  .overlay.active { display: flex; }
  .overlay button {
    background: #fff;
    color: #000;
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
  }
  .overlay button:hover { background: #ccc; }
</style>
</head>
<body>
  <div class="hud">
    <div>Score: <strong id="score">0</strong></div>
    <div>Best: <strong id="best">0</strong></div>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="footer">
    <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>WASD</kbd> to move &nbsp;·&nbsp; <kbd>Space</kbd> to pause
  </div>
  <div class="overlay" id="overlay">
    <div id="overlayTitle">Game Over</div>
    <div id="overlayScore" style="font-size:1rem;color:#bbb;"></div>
    <button id="restartBtn">Play Again</button>
  </div>

<script>
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const overlay = document.getElementById("overlay");
  const overlayTitle = document.getElementById("overlayTitle");
  const overlayScore = document.getElementById("overlayScore");
  const restartBtn = document.getElementById("restartBtn");

  const GRID = 20;
  const CELL = canvas.width / GRID;
  let snake, dir, nextDir, food, score, alive, paused, tickInterval;
  let best = parseInt(localStorage.getItem("snake-best") || "0", 10);
  bestEl.textContent = best;

  function reset() {
    snake = [{ x: 9, y: 10 }, { x: 8, y: 10 }, { x: 7, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = dir;
    spawnFood();
    score = 0;
    alive = true;
    paused = false;
    scoreEl.textContent = "0";
    overlay.classList.remove("active");
    if (tickInterval) clearInterval(tickInterval);
    tickInterval = setInterval(tick, 110);
    draw();
  }

  function spawnFood() {
    while (true) {
      const f = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
      if (!snake.some(s => s.x === f.x && s.y === f.y)) { food = f; return; }
    }
  }

  function tick() {
    if (!alive || paused) return;
    dir = nextDir;
    const head = { x: (snake[0].x + dir.x + GRID) % GRID, y: (snake[0].y + dir.y + GRID) % GRID };
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      alive = false;
      if (score > best) {
        best = score;
        localStorage.setItem("snake-best", String(best));
        bestEl.textContent = best;
      }
      overlayTitle.textContent = "Game Over";
      overlayScore.textContent = `Score: ${score} · Best: ${best}`;
      overlay.classList.add("active");
      return;
    }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      spawnFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function draw() {
    ctx.fillStyle = "#0a0a0a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#fff";
    ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);
    snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? "#fff" : "#888";
      ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
    });
  }

  function setDir(x, y) {
    if (snake.length > 1 && dir.x === -x && dir.y === -y) return; // can't reverse
    nextDir = { x, y };
  }

  document.addEventListener("keydown", e => {
    const k = e.key.toLowerCase();
    if (k === "arrowup" || k === "w") { setDir(0, -1); e.preventDefault(); }
    else if (k === "arrowdown" || k === "s") { setDir(0, 1); e.preventDefault(); }
    else if (k === "arrowleft" || k === "a") { setDir(-1, 0); e.preventDefault(); }
    else if (k === "arrowright" || k === "d") { setDir(1, 0); e.preventDefault(); }
    else if (k === " ") { paused = !paused; e.preventDefault(); }
    else if (k === "enter" && !alive) { reset(); }
  });

  restartBtn.addEventListener("click", reset);

  reset();
</script>
</body>
</html>
